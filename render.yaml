# One-click deploy to Render (https://render.com).
# In the Render dashboard: New + > Blueprint > connect this repo.
# Then set the secret env vars (JWT_SECRET, and the GOOGLE_* vars if using
# the Google Sheets backend) under the service's Environment tab.
services:
  - type: web
    name: ventverse
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: STORAGE
        value: sqlite        # change to "sheets" to use the Google Sheets backend
      - key: GOOGLE_SHEET_ID
        sync: false          # set in dashboard when STORAGE=sheets
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false          # paste service-account key JSON (kept secret)
